<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche Utilisateur</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #764ba2;
        }

        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .results {
            margin-top: 30px;
        }

        .user-card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .user-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .user-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .user-card p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }

        .nav-links {
            margin-top: 30px;
            text-align: center;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Rechercher un Utilisateur</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Nom d'utilisateur ou ID...">
            <button onclick="search()">Chercher</button>
        </div>

        <div class="results" id="results"></div>

        <div class="nav-links">
            <a href="/dashboard">← Retour</a>
            <a href="/logout">Déconnexion</a>
        </div>
    </div>

    <script>
        function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                alert('Entrez un nom ou un ID');
                return;
            }

            fetch(`/api/search?q=${encodeURIComponent(query)}`)
                .then(r => r.json())
                .then(data => {
                    const resultsDiv = document.getElementById('results');
                    if (data.users.length === 0) {
                        resultsDiv.innerHTML = '<p style="text-align: center; color: #999;">Aucun utilisateur trouvé</p>';
                        return;
                    }

                    resultsDiv.innerHTML = data.users.map(user => `
                        <div class="user-card" onclick="window.location.href='/user/${user.user_id}'">
                            <h3>${user.username}</h3>
                            <p>ID: ${user.user_id}</p>
                            <p>Niveau: ${user.level} | XP: ${user.xp}</p>
                        </div>
                    `).join('');
                });
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
