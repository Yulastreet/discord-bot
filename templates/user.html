<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Utilisateur</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 20px;
        }

        .profile-header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .user-id {
            color: #999;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 10px;
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .nav-links a {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background: #764ba2;
        }

        .details {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
            font-weight: 500;
        }

        .detail-value {
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p>Chargement du profil...</p>
        </div>

        <div id="profileContent" style="display: none;">
            <div class="profile-header">
                <h1 id="username"></h1>
                <p class="user-id">ID: <span id="userId"></span></p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Niveau</h3>
                    <div class="value" id="level">-</div>
                </div>
                <div class="stat-card">
                    <h3>XP Total</h3>
                    <div class="value" id="xp">-</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="progressText">Progression vers le prochain niveau</div>

            <div class="details">
                <div class="detail-row">
                    <span class="detail-label">ID Discord</span>
                    <span class="detail-value" id="discordId">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Niveau actuel</span>
                    <span class="detail-value" id="levelDetail">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">XP accumulé</span>
                    <span class="detail-value" id="xpDetail">-</span>
                </div>
            </div>

            <div class="nav-links">
                <a href="/search">← Retour à la recherche</a>
                <a href="/dashboard">Dashboard</a>
                <a href="/logout">Déconnexion</a>
            </div>
        </div>

        <div id="errorState" style="display: none;">
            <div class="error">
                <h2>❌ Erreur</h2>
                <p id="errorMessage"></p>
                <div class="nav-links" style="margin-top: 20px;">
                    <a href="/search">← Retour à la recherche</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Récupère l'ID depuis l'URL
        const userId = window.location.pathname.split('/').pop();

        // Lance le chargement au démarrage
        window.addEventListener('DOMContentLoaded', loadUserProfile);

        function loadUserProfile() {
            fetch(`/api/user/${userId}`)
                .then(response => {
                    if (!response.ok) throw new Error('Utilisateur non trouvé');
                    return response.json();
                })
                .then(data => {
                    displayProfile(data.user);
                })
                .catch(error => {
                    showError(error.message);
                });
        }

        function displayProfile(user) {
            // Remplir les données
            document.getElementById('username').textContent = user.username;
            document.getElementById('userId').textContent = user.user_id;
            document.getElementById('level').textContent = user.level;
            document.getElementById('xp').textContent = user.xp.toLocaleString('fr-FR');
            document.getElementById('discordId').textContent = user.user_id;
            document.getElementById('levelDetail').textContent = user.level;
            document.getElementById('xpDetail').textContent = user.xp.toLocaleString('fr-FR');

            // Calcul de la progression (simple: XP / (niveau * 1000))
            const xpForNextLevel = user.level * 1000;
            const currentLevelXp = (user.level - 1) * 1000;
            const xpInCurrentLevel = user.xp - currentLevelXp;
            const xpNeeded = xpForNextLevel - currentLevelXp;
            const progress = Math.min((xpInCurrentLevel / xpNeeded) * 100, 100);

            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = 
                `${Math.round(progress)}% vers le niveau ${user.level + 1}`;

            // Afficher le profil et cacher le chargement
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('profileContent').style.display = 'block';
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
        }
    </script>
</body>
</html>
