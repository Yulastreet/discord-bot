<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Utilisateur</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 50px;
            flex-shrink: 0;
        }

        .user-info h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .user-info p {
            color: #666;
            margin: 5px 0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #666;
            font-size: 14px;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }

        .chart-container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
        }

        .chart-container h3 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .nav-links {
            margin-top: 30px;
            text-align: center;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .error {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="content">
            <p style="text-align: center; color: #999;">Chargement...</p>
        </div>
    </div>

    <script>
        const userId = new URLSearchParams(window.location.search).get('id') || window.location.pathname.split('/').pop();

        fetch(`/api/user/${userId}`)
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('content').innerHTML = `<p class="error">❌ ${data.error}</p>`;
                    return;
                }

                const user = data.user;
                const html = `
                    <div class="header">
                        <div class="avatar">${user.username.charAt(0).toUpperCase()}</div>
                        <div class="user-info">
                            <h1>${user.username}</h1>
                            <p><strong>ID:</strong> ${user.user_id}</p>
                            <p><strong>Niveau:</strong> ${user.level}</p>
                            <p><strong>XP Total:</strong> ${user.xp}</p>
                        </div>
                    </div>

                    <div class="stats">
                        <div class="stat-card">
                            <h3>${user.level}</h3>
                            <p>Niveau</p>
                        </div>
                        <div class="stat-card">
                            <h3>${user.xp}</h3>
                            <p>XP</p>
                        </div>
                        <div class="stat-card">
                            <h3>${Math.floor(user.xp / (user.level + 1))}</h3>
                            <p>XP/Niveau</p>
                        </div>
                    </div>

                    <div class="nav-links">
                        <a href="/dashboard">← Retour au Dashboard</a>
                        <a href="/search">🔍 Rechercher un autre utilisateur</a>
                        <a href="/logout">Déconnexion</a>
                    </div>
                `;

                document.getElementById('content').innerHTML = html;
            })
            .catch(err => {
                document.getElementById('content').innerHTML = `<p class="error">❌ Erreur: ${err.message}</p>`;
            });
    </script>
</body>
</html>
